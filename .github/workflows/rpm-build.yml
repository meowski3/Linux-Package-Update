name: Build linux update RPM

on:
  push:
    push:

  workflow_dispatch:   # Allow manual runs from the Actions tab

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9    # Build in an RPM-native environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install RPM build tools
        run: |
          dnf install -y rpm-build rpmdevtools

      - name: Set up RPM build tree
        run: rpmdev-setuptree

      - name: Copy spec and source files
        run: |
          cp linux-update.spec ~/rpmbuild/SPECS/
          cp linux-update.sh   ~/rpmbuild/SOURCES/

      - name: Set version from tag (or default to 1.0.0)
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="1.0.0"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Patch the version into the spec file
          sed -i "s/^Version:.*/Version:        $VERSION/" ~/rpmbuild/SPECS/linux-update.spec

      - name: Build RPM
        run: |
          rpmbuild -bb ~/rpmbuild/SPECS/linux-update.spec

      - name: Find built RPM
        id: find_rpm
        run: |
          RPM_PATH=$(find ~/rpmbuild/RPMS -name "*.rpm" | head -n 1)
          echo "RPM_PATH=$RPM_PATH" >> $GITHUB_ENV
          echo "RPM_NAME=$(basename $RPM_PATH)" >> $GITHUB_ENV

      - name: Upload RPM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RPM_NAME }}
          path: ${{ env.RPM_PATH }}

      - name: Create GitHub Release and attach RPM
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RPM_PATH }}
          generate_release_notes: true